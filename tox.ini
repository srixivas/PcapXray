[tox]
envlist = py310, py311, py312, all-engines
isolated_build = false

[testenv]
sitepackages = false
deps =
    pytest
    pytest-cov
    -r requirements.txt
commands =
    pytest -m "not network" --cov=Source/Module --cov-report=term-missing Test/ {posargs}

[testenv:all-engines]
description = Run with all optional engines including dpkt
deps =
    pytest
    pytest-cov
    dpkt>=1.9.8
    -r requirements.txt
commands =
    pytest -m "not network" --cov=Source/Module --cov-report=term-missing Test/ {posargs}
